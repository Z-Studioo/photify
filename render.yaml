# Render Blueprint — Photify
#
# Apply with: Dashboard -> Blueprints -> "New Blueprint Instance" or "Sync".
# After first apply, fill in the secrets marked `sync: false` once via the
# Render Dashboard. They persist across deploys.
#
# Public values are committed here so they remain in version control.
# Anything sensitive (API keys, tokens, service-role keys) uses `sync: false`,
# which means Render keeps the value already set in the Dashboard and never
# reads it from this file.

services:
  # ---------------------------------------------------------------------------
  # Frontend — React Router v7 Node SSR server (hybrid: SEO routes are
  # server-rendered, tool/admin routes hydrate client-only via ClientOnly).
  #
  # `react-router-serve` is a minimal Express wrapper that mounts the
  # framework's request handler at `/` and serves the prerendered legal
  # pages (/privacy-policy, /terms-of-use, /refund-return-policy) as static
  # HTML. Everything else is rendered on each request from
  # `build/server/index.js`.
  #
  # Build-time VITE_* env vars stay as before — they're still inlined into
  # the client bundle. Runtime env (e.g. NODE_ENV, PORT) is read by the
  # Node process at boot.
  # ---------------------------------------------------------------------------
  - type: web
    runtime: node
    name: photify-frontend
    buildCommand: cd app && npm install && npm run build
    startCommand: cd app && npm start
    healthCheckPath: /
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: VITE_API_URL
        value: https://photify-backend.onrender.com
      - key: VITE_APP_URL
        value: https://www.photify.co
      - key: VITE_PUBLIC_SITE_URL
        value: https://photify.co
      # Public Supabase + Stripe + Firebase keys are inlined into the JS
      # bundle at build time, so Vite needs them as build-time env vars.
      # Marked `sync: false` so the actual values live in the Dashboard.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false

  # ---------------------------------------------------------------------------
  # Backend — Node/Express API. Runs the compiled output from `tsc`.
  # CORS_ALLOWED_ORIGINS is comma-separated so apex + www both work; the
  # singular CLIENT_URL stays canonical and is used for Stripe redirect
  # URLs and email links.
  # ---------------------------------------------------------------------------
  - type: web
    runtime: node
    name: photify-backend
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://www.photify.co
      - key: CORS_ALLOWED_ORIGINS
        value: https://www.photify.co,https://photify.co
      - key: PUBLIC_APP_URL
        value: https://www.photify.co
      - key: SENDGRID_FROM_EMAIL
        value: noreply@photify.co
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      # Secrets — keep values in the Render Dashboard, never in the repo.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: POSTCODER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
